<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>

  <!-- Ambient starfield, purely decorative -->
  <div class="starfield" aria-hidden="true"></div>

  <div class="container">

    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="header-text">
        <p class="eyebrow">Mission: APOD Archive</p>
        <h1>Space Explorer</h1>
      </div>
    </header>

    <p class="intro">
      Browse the Astronomy Picture of the Day archive. Pick a date range below and
      pull down every image NASA published during that window.
    </p>

    <!-- LevelUp: random "Did You Know?" space fact -->
    <section class="fact-panel" id="factPanel">
      <span class="fact-label">Did you know?</span>
      <p class="fact-text" id="factText"></p>
    </section>

    <div class="filters">
      <div class="field">
        <label for="startDate">Start date</label>
        <input type="date" id="startDate" />
      </div>
      <div class="field">
        <label for="endDate">End date</label>
        <input type="date" id="endDate" />
      </div>
      <button id="fetchBtn">
        <span class="btn-icon">&#9679;</span> Get Space Images
      </button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-media" id="modalMedia"></div>
      <div class="modal-body">
        <p class="modal-date" id="modalDate"></p>
        <h2 id="modalTitle"></h2>
        <p class="modal-explanation" id="modalExplanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="site-header">
      <imgnasa-worm-logo.png
      <h1>Space Explorer</h1>
    </header>

    <!-- Random Space Fact -->
    <div id="spaceFact" class="space-fact"></div>

    <!-- Date Filters -->
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="loadImagesBtn">Get Space Images</button>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>
          Select a date range and click
          "Get Space Images" to explore the cosmos!
        </p>
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal">

    <div class="modal-content">

      <span id="closeModal">&times;</span>

      

      <h2 id="modalTitle"></h2>

      <p id="modalDate"></p>

      <p id="modalExplanation"></p>

    </div>

  </div>

  <!-- JavaScript Files --> 
<script src="js/dateRange.js"></script>
js/script.jsscript>


</body>
</html>
